name: Build Unsigned iOS App (.ipa)

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to trigger the build manually

jobs:
  build_ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Build Xcode Project (Unsigned)
        run: |
          cd ios/App
          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package into .ipa
        run: |
          mkdir -p Payload
          mv ios/App/build/Release-iphoneos/App.app Payload/
          zip -r habit-tracker.ipa Payload
          rm -rf Payload

      - name: Upload .ipa Artifact
        uses: actions/upload-artifact@v4
        with:
          name: habit-tracker-ios
          path: habit-tracker.ipa
          retention-days: 5
